<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; color: #333; }
        h1 { color: #0078d4; }
        .profile { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .profile dt { font-weight: bold; margin-top: 10px; color: #555; }
        .profile dd { margin-left: 0; }
        a.logout { display: inline-block; margin-top: 20px; color: #d43; text-decoration: none; }
        a.logout:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Welcome, {{ user.get("name", "User") }}!</h1>

    <div class="profile">
        <h2>Your Profile</h2>
        <dl>
            <dt>Display Name</dt>
            <dd>{{ profile.get("displayName", "N/A") }}</dd>

            <dt>Email</dt>
            <dd>{{ profile.get("mail", profile.get("userPrincipalName", "N/A")) }}</dd>

            <dt>Job Title</dt>
            <dd>{{ profile.get("jobTitle", "N/A") }}</dd>

            <dt>Office Location</dt>
            <dd>{{ profile.get("officeLocation", "N/A") }}</dd>
        </dl>
    </div>

    <a class="logout" href="{{ url_for('logout') }}">Sign out</a>
</body>
</html>
